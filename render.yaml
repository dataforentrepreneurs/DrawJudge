services:
  # Main Backend Service (serving API + Frontends)
  - type: web
    name: party-games-hub
    env: python
    plan: free
    buildCommand: |
      # 1. Install python dependencies
      pip install -r Server/requirements.txt
      
      # 2. Build DrawJudge FIRST (so Launcher's postbuild can copy it)
      if [ -d "Games/DrawJudge" ]; then
        (cd Games/DrawJudge && npm install && npm run build)
      fi
      
      # 3. Build Launcher
      if [ -d "Games/Launcher" ]; then
        (cd Games/Launcher && npm install && npm run build)
      fi
    startCommand: |
      cd Server
      python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: party-games-redis
          property: connectionString
      - key: SENTRY_DSN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: ENVIRONMENT
        value: production
      - key: LAUNCHER_DIST
        value: /opt/render/project/src/Games/Launcher/dist
      - key: DRAWJUDGE_DIST
        value: /opt/render/project/src/Games/DrawJudge/dist

  # Redis instance for persistence
  - type: keyvalue
    name: party-games-redis
    plan: free
    ipAllowList: [] 
